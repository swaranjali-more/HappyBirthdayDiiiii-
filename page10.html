<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Saloni Di's Secret Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&family=Parisienne&display=swap" rel="stylesheet">

<style>

:root{
    --pink:#ff007f;
    --purple:#4b0082;
    --gold:#ffcc00;
    --cyan:#00ffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
    radial-gradient(circle at top,#3c1361,#0f0c29 70%);
    color:white;
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow-x:hidden;
    padding-bottom:80px;
}

/* ================= FLOATING EMOJIS ================= */

.emoji{
    position:fixed;
    font-size:1.5rem;
    pointer-events:none;
    z-index:1;
    animation:floatEmoji 10s linear infinite;
    opacity:0.7;
}

@keyframes floatEmoji{

    0%{
        transform:translateY(100vh) translateX(0);
        opacity:0;
    }

    10%{
        opacity:0.8;
    }

    90%{
        opacity:0.8;
    }

    100%{
        transform:translateY(-20vh) translateX(50px);
        opacity:0;
    }
}

/* ================= BUNTING ================= */

.bunting{
    margin-top:30px;
    z-index:10;
}

.row{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-bottom:10px;
}

.flag{
    width:35px;
    height:48px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-weight:bold;
    font-size:1.2rem;

    clip-path: polygon(0% 0%,100% 0%,100% 80%,50% 100%,0% 80%);

    box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.c1{ background:var(--pink); }
.c2{ background:#8a2be2; }
.c3{ background:var(--gold); }
.c4{ background:var(--cyan); }

/* ================= TITLE ================= */

h1{
    font-family:'Parisienne',cursive;
    font-size:4rem;
    color:var(--gold);
    margin-top:10px;
    text-shadow:0 0 20px rgba(255,204,0,0.5);
}

.instruction{
    font-family:'Dancing Script',cursive;
    font-size:2rem;
    color:var(--cyan);
    margin:15px 0 50px;
}

/* ================= COLLAGE ================= */

.collage-container{
    position:relative;
    width:95%;
    max-width:1200px;
    height:780px;
    margin:auto;
}

/* ================= PHOTO CARDS ================= */

.photo-card{
    position:absolute;

    width:230px;

    background:rgba(255,255,255,0.95);

    padding:10px 10px 30px;

    border-radius:10px;

    box-shadow:
    0 15px 35px rgba(0,0,0,0.5),
    0 0 20px rgba(255,255,255,0.08);

    cursor:pointer;

    transition:0.4s cubic-bezier(0.175,0.885,0.32,1.275);

    z-index:5;
}

.photo-card img{
    width:100%;
    height:230px;
    object-fit:cover;
    border-radius:8px;
}

/* IMAGE TITLES */

.photo-title{
    text-align:center;
    color:var(--pink);
    font-family:'Dancing Script',cursive;
    font-size:1.6rem;
    margin-top:12px;
    font-weight:bold;
}

/* HOVER EFFECT */

.photo-card:hover{
    transform:scale(1.12) rotate(0deg) !important;
    z-index:100 !important;
}

/* ================= PERFECT ALIGNMENT ================= */

.p1{
    top:20px;
    left:7%;
    transform:rotate(-8deg);
}

.p2{
    top:20px;
    right:7%;
    transform:rotate(8deg);
}

.p3{
    top:220px;
    left:50%;
    transform:translateX(-50%) rotate(-2deg);
    z-index:20;
}

.p4{
    bottom:50px;
    left:13%;
    transform:rotate(5deg);
}

.p5{
    bottom:50px;
    right:13%;
    transform:rotate(-5deg);
}

/* ================= MODAL ================= */

.modal{
    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.85);

    backdrop-filter:blur(10px);

    display:none;

    justify-content:center;
    align-items:center;

    z-index:1000;
}

.modal-box{

    background:white;
    color:#222;

    padding:40px;

    border-radius:25px;

    text-align:center;

    max-width:420px;

    position:relative;

    animation:popup 0.4s ease;
}

@keyframes popup{

    from{
        transform:scale(0.5);
        opacity:0;
    }

    to{
        transform:scale(1);
        opacity:1;
    }
}

.close{

    position:absolute;
    top:10px;
    right:20px;

    font-size:30px;

    cursor:pointer;

    color:#777;
}

/* ================= BUTTON ================= */

.btn-restart{

    margin-top:40px;

    background:linear-gradient(45deg,var(--pink),var(--purple));

    color:white;

    border:none;

    padding:16px 42px;

    border-radius:50px;

    font-size:1.1rem;
    font-weight:600;

    cursor:pointer;

    box-shadow:0 10px 20px rgba(255,0,127,0.3);

    transition:0.3s;

    letter-spacing:2px;
}

.btn-restart:hover{

    transform:translateY(-5px) scale(1.05);

    box-shadow:0 15px 30px rgba(255,0,127,0.5);
}

/* ================= MOBILE RESPONSIVE ================= */

@media(max-width:768px){

    .collage-container{

        height:auto;

        display:flex;
        flex-direction:column;
        align-items:center;

        gap:35px;
    }

    .photo-card{

        position:relative;

        width:85%;
        max-width:320px;
    }

    .p1,.p2,.p3,.p4,.p5{

        top:auto;
        bottom:auto;
        left:auto;
        right:auto;

        transform:none;
    }

    h1{
        font-size:2.8rem;
        text-align:center;
        padding:0 20px;
    }

    .instruction{
        font-size:1.5rem;
        text-align:center;
        padding:0 20px;
    }
}

</style>
</head>

<body>

<!-- ================= BUNTING ================= -->

<div class="bunting">

    <div class="row">
        <div class="flag c1">H</div>
        <div class="flag c2">A</div>
        <div class="flag c3">P</div>
        <div class="flag c4">P</div>
        <div class="flag c1">Y</div>
    </div>

    <div class="row">
        <div class="flag c4">B</div>
        <div class="flag c1">I</div>
        <div class="flag c2">R</div>
        <div class="flag c3">T</div>
        <div class="flag c1">H</div>
        <div class="flag c4">D</div>
        <div class="flag c2">A</div>
        <div class="flag c3">Y</div>
    </div>

    <div class="row">
        <div class="flag c1">Q</div>
        <div class="flag c4">U</div>
        <div class="flag c2">E</div>
        <div class="flag c3">E</div>
        <div class="flag c1">N</div>
    </div>

    <div class="row">
        <div class="flag c3">D</div>
        <div class="flag c2">I</div>
    </div>

</div>

<!-- ================= HEADING ================= -->

<h1>Saloni Di's Special Day 💖</h1>

<p class="instruction">
✨ Click the photos to reveal little secrets ✨
</p>

<!-- ================= COLLAGE ================= -->

<div class="collage-container">

    <div class="photo-card p1"
    onclick="openMsg('If I am Doraemon, you are my Nobita’s backup plan ✨❤️')">

        <img src="16.jpeg">

        <p class="photo-title">
            Pretty Smile 🌸
        </p>
    </div>

    <div class="photo-card p2"
    onclick="openMsg('You should honestly pay rent for living in my Heart all day 💖🌸')">

        <img src="15.jpeg">

        <p class="photo-title">
            My Safe Place 💖
        </p>
    </div>

    <div class="photo-card p3"
    onclick="openMsg('POV: You become home without knowing it!!💖')">

        <img src="14.jpeg">

        <p class="photo-title">
            Queen Energy 👑
        </p>
    </div>

    <div class="photo-card p4"
    onclick="openMsg('If I am wicketkeeper, you are the catch I never want to drop 😭💞 ')">

        <img src="13.jpeg">

        <p class="photo-title">
            Cutest Human 🎀
        </p>
    </div>

    <div class="photo-card p5"
    onclick="openMsg('The way I wait for your message is worse than Popatlal waiting for marriage 😭💖')">

        <img src="17.jpeg">

        <p class="photo-title">
            Forever Favorite ✨
        </p>
    </div>

</div>

<!-- ================= BUTTON ================= -->

<button class="btn-restart"
onclick="location.href='index.html'">

Restart the Magic ✨

</button>

<!-- ================= MODAL ================= -->

<div class="modal" id="msgModal">

    <div class="modal-box">

        <span class="close"
        onclick="closeMsg()">

        &times;

        </span>

        <h3 style="
        font-family:'Parisienne';
        color:var(--pink);
        font-size:2.4rem;
        margin-bottom:15px;">

        A Secret For You 💌

        </h3>

        <p id="messageText"
        style="
        font-family:'Dancing Script';
        font-size:2rem;
        line-height:1.5;">

        </p>

    </div>

</div>

<script>

/* ================= FLOATING EMOJIS ================= */

function createEmoji(){

    const emojis=['💖','✨','🎈','🎂','🌸','🎁','🍭'];

    const e=document.createElement('div');

    e.className='emoji';

    e.innerText=emojis[Math.floor(Math.random()*emojis.length)];

    e.style.left=Math.random()*100+'vw';

    e.style.animationDuration=(Math.random()*5+7)+'s';

    e.style.fontSize=(Math.random()*20+20)+'px';

    document.body.appendChild(e);

    setTimeout(()=>{

        e.remove();

    },10000);
}

setInterval(createEmoji,800);

/* ================= MODAL ================= */

function openMsg(text){

    document.getElementById('messageText').innerText=text;

    document.getElementById('msgModal').style.display='flex';
}

function closeMsg(){

    document.getElementById('msgModal').style.display='none';
}

window.onclick=function(event){

    if(event.target==document.getElementById('msgModal')){

        closeMsg();
    }
}

/* ================= MUSIC ================= */

const musicBtn = document.getElementById("musicBtn");
const audio = new Audio("song1.mpeg");   // Change to your song name
audio.loop = true;

// Start music automatically
window.addEventListener("load", () => {

    audio.play().then(() => {

        musicBtn.classList.add("playing");
        musicBtn.innerHTML = "⏸️";

    }).catch(() => {

        musicBtn.innerHTML = "🎵";

    });

});

// Play / Pause button

musicBtn.onclick = () => {

    if(audio.paused){

        audio.play();

        musicBtn.classList.add("playing");
        musicBtn.innerHTML = "⏸️";

    }else{

        audio.pause();

        musicBtn.classList.remove("playing");
        musicBtn.innerHTML = "🎵";

    }

};
</script>

</body>
</html>
