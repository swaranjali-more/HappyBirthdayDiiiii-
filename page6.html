<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memories with Di!!</title>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&family=Parisienne&display=swap" rel="stylesheet">

    <style>
        :root {
            --hot-pink: #ff007f;
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ff1493, #ff007f, #800080, #ff69b4);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            color: white;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .star {
            position: fixed;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
            text-align: center;
        }

        h1 {
            font-family: 'Parisienne', cursive;
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin-bottom: 10px;
        }

        .subtitle {
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            color: #ffd1dc;
            margin-bottom: 40px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .photo-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 15px;
            transition: 0.4s;
            display: flex;
            flex-direction: column;
        }

        .photo-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255,255,255,0.2);
        }

        .photo-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 18px;
            margin-bottom: 15px;
        }

        .photo-label {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .next-btn {
            background: linear-gradient(45deg, #ff007f, #ff69b4);
            color: white;
            border: none;
            padding: 18px 45px;
            border-radius: 50px;
            margin-top: 50px;
            cursor: pointer;
        }

        .music-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .music-toggle.playing {
            background: var(--hot-pink);
        }
    </style>
</head>

<body>

<div class="music-toggle" id="musicBtn">🎵</div>

<div class="container">
    <h1>Our Beautiful Memories</h1>
    <div class="subtitle">✨ Every moment with you is a treasure ✨</div>

    <div class="gallery">

        <div class="photo-card">
            <img src="1st.jpeg" class="photo-img">
            <div class="photo-label">You are my chosen Sister🫣❤️</div>
        </div>

        <div class="photo-card">
            <img src="2nd.jpeg" class="photo-img">
            <div class="photo-label">Everything About U, PERFECT😝🫶</div>
        </div>

        <div class="photo-card">
            <img src="3rd.jpeg" class="photo-img">
            <div class="photo-label">That Traditional Glow Hits Different🥺👉👈</div>
        </div>

        <div class="photo-card">
            <img src="4th.jpeg" class="photo-img">
            <div class="photo-label">Random but bestest🥹🤍</div>
        </div>

        <div class="photo-card">
            <img src="5th.jpeg" class="photo-img">
            <div class="photo-label">Miss President and Miss Treasurer🤭🎀</div>
        </div>

        <div class="photo-card">
            <img src="6th.jpeg" class="photo-img">
            <div class="photo-label">Rani lage che!!👑❤️</div>
        </div>

    </div>

    <button class="next-btn" id="nextBtn">More Memories 🎀</button>
</div>

<script>
    function createStars() {
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            document.body.appendChild(star);
        }
    }
    createStars();

    // ================= MUSIC =================
    const musicBtn = document.getElementById("musicBtn");
    const audio = new Audio("song4.mpeg");   // Use the same song as the previous page
    audio.loop = true;

    // Resume music from previous page
    function syncMusic() {

        const savedTime = localStorage.getItem("birthdayMusicTime");

        if (savedTime) {
            audio.currentTime = parseFloat(savedTime);
        }

        if (localStorage.getItem("birthdayMusicPlaying") === "true") {

            audio.play().then(() => {
                musicBtn.classList.add("playing");
                musicBtn.innerHTML = "⏸️";
            }).catch(() => {
                musicBtn.innerHTML = "🎵";
            });

        }

    }

    window.addEventListener("load", syncMusic);

    // Save current position continuously
    audio.ontimeupdate = () => {
        localStorage.setItem("birthdayMusicTime", audio.currentTime);
    };

    // Play / Pause button
    musicBtn.onclick = () => {

        if (audio.paused) {

            audio.play();

            musicBtn.classList.add("playing");
            musicBtn.innerHTML = "⏸️";

            localStorage.setItem("birthdayMusicPlaying", "true");

        } else {

            audio.pause();

            musicBtn.classList.remove("playing");
            musicBtn.innerHTML = "🎵";

            localStorage.setItem("birthdayMusicPlaying", "false");

        }

    };

    // Next Page
    document.getElementById("nextBtn").onclick = () => {

        localStorage.setItem("birthdayMusicTime", audio.currentTime);
        localStorage.setItem("birthdayMusicPlaying", !audio.paused);

        window.location.href = "page7.html";

    };
</script>
</body>
</html>
